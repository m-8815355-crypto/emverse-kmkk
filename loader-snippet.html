<!-- 
    GLOBAL PAGE LOADER
    Copy and paste this snippet at the TOP of the <body> tag in EVERY HTML page
    
    Required files:
    - css/loader.css (stylesheet)
    - js/loader.js (transition logic)
    - js/Aurora.js (background effect)
-->

<div id="page-loader">
    <!-- Aurora Background Canvas -->
    <canvas id="loader-aurora-canvas"></canvas>

    <!-- Loader Content -->
    <div class="loader-content">
        <!-- Magnet with Rotating Particles -->
        <div class="loader-magnet-container">
            <!-- Bar Magnet -->
            <div class="loader-magnet">
                <div class="magnet-north">N</div>
                <div class="magnet-south">S</div>
            </div>

            <!-- Particle Ring (24 particles for smooth rotation) -->
            <div class="loader-particles">
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
            </div>
        </div>

        <!-- Loading Text -->
        <div class="loader-text">
            <h2 class="loader-title">EM-Verse</h2>
            <p class="loader-status">We'll be right there</p>
        </div>

        <!-- Progress Bar -->
        <div class="loader-progress">
            <div class="loader-progress-bar"></div>
        </div>
    </div>
</div>
