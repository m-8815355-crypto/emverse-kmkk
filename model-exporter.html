<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Exporter | EM-Verse</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        button:disabled {
            background-color: #475569;
            cursor: not-allowed;
        }

        #status {
            margin-top: 20px;
            color: #94a3b8;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
            max-width: 600px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <div class="info-box">
        <h1>Model Generator</h1>
        <p>This tool converts the Bar Magnet code (JS) into a 3D binary file (.glb) that can be used by the AR WebXR
            Viewer.</p>
    </div>

    <button id="export-btn">Generate & Download magnet.glb</button>

    <div id="status">Ready</div>

    <!-- Import Map for Three.js -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFExporter } from 'three/addons/exporters/GLTFExporter.js';

        // Import the user's Bar Magnet code
        import { createBarMagnet } from './assets/models/src/BarMagnet.js';

        const btn = document.getElementById('export-btn');
        const status = document.getElementById('status');

        btn.addEventListener('click', () => {
            btn.disabled = true;
            status.textContent = 'Generating 3D Scene...';

            try {
                // 1. Create the scene
                const scene = new THREE.Scene();

                // 2. Create the magnet using user's existing logic
                const magnet = createBarMagnet();
                scene.add(magnet);

                status.textContent = 'Parsing to GLB...';

                // 3. Export to GLB
                const exporter = new GLTFExporter();
                exporter.parse(
                    scene,
                    function (result) {
                        saveArrayBuffer(result, 'magnet.glb');
                        status.textContent = 'Download started! Please check your downloads folder.';
                        status.style.color = '#4ade80';
                        btn.disabled = false;
                        btn.textContent = 'Download Again';
                    },
                    function (error) {
                        console.error('An error happened', error);
                        status.textContent = 'Error: ' + error.message;
                        btn.disabled = false;
                    },
                    { binary: true }
                );

            } catch (err) {
                console.error(err);
                status.textContent = 'Error: ' + err.message;
                btn.disabled = false;
            }
        });

        function saveArrayBuffer(buffer, filename) {
            save(new Blob([buffer], { type: 'application/octet-stream' }), filename);
        }

        function save(blob, filename) {
            const link = document.createElement('a');
            link.style.display = 'none';
            document.body.appendChild(link);
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>

</html>
