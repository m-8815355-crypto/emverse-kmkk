<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EM-Verse | AR Experience</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0f172a;
            /* Dark background */
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        model-viewer {
            width: 100%;
            height: 100%;
            background-color: #0f172a;
            --poster-color: #0f172a;
        }

        .header {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            text-decoration: none;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        /* Loading indicator styling */
        .progress-bar {
            display: block;
            width: 33%;
            height: 10%;
            max-height: 2%;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate3d(-50%, -50%, 0);
            border-radius: 25px;
            box-shadow: 0px 3px 10px 3px rgba(0, 0, 0, 0.5), 0px 0px 5px 1px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.9);
            background-color: rgba(0, 0, 0, 0.5);
        }

        .progress-bar.hide {
            visibility: hidden;
            transition: visibility 0.3s;
        }

        .update-bar {
            background-color: rgba(255, 255, 255, 0.9);
            width: 0%;
            height: 100%;
            border-radius: 25px;
            float: left;
            transition: width 0.3s;
        }

        /* AR Button Customization */
        #ar-button {
            background-image: url(assets/icons/ar-icon.png);
            /* Ensure you have an icon or use text */
            background-repeat: no-repeat;
            background-size: 20px 20px;
            background-position: 12px 50%;
            background-color: #fff;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            bottom: 30px;
            padding: 0px 16px 0px 40px;
            font-family: Roboto, Regular, Helvetica, sans-serif;
            font-size: 14px;
            color: #4285f4;
            height: 36px;
            line-height: 36px;
            border-radius: 18px;
            border: 1px solid #DADCE0;
        }

        #ar-button:active {
            background-color: #E8EAED;
        }

        #ar-button:focus {
            outline: none;
        }

        #ar-button:focus-visible {
            outline: 1px solid #4285f4;
        }

        @keyframes circle {
            from {
                transform: translateX(-50%) rotate(0deg) translateX(50px) rotate(0deg);
            }

            to {
                transform: translateX(-50%) rotate(360deg) translateX(50px) rotate(-360deg);
            }
        }

        @keyframes elongate {
            from {
                transform: translateX(100px)
            }

            to {
                transform: translateX(-100px)
            }
        }

        model-viewer>#ar-prompt {
            position: absolute;
            left: 50%;
            bottom: 175px;
            animation: elongate 2s infinite ease-in-out alternate;
            display: none;
        }

        model-viewer[ar-status="session-started"]>#ar-prompt {
            display: block;
        }

        model-viewer>#ar-prompt>img {
            animation: circle 4s linear infinite;
        }

        .note {
            position: absolute;
            bottom: 10px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            pointer-events: none;
        }

        /* Error message if model missing */
        #error-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(220, 38, 38, 0.9);
            padding: 20px;
            border-radius: 12px;
            display: none;
        }
    </style>
    <!-- Import the component -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>

<body>

    <div class="header">
        <a href="index.html" class="back-btn">← Back to Home</a>
    </div>

    <!-- 
        IMPORTANT: Place your .glb model file in 'assets/models/magnet.glb'.
        If you have a .usdz file for iOS, place it in 'assets/models/magnet.usdz' 
        and uncomment the ios-src attribute below.
    -->
    <model-viewer src="assets/models/magnet.glb" ar ar-modes="webxr scene-viewer quick-look" camera-controls
        shadow-intensity="1" autoplay exposure="1" environment-image="neutral" alt="A 3D model of a bar magnet">

        <!-- Optional: iOS support -->
        <!-- ios-src="assets/models/magnet.usdz" -->

        <div class="progress-bar hide" slot="progress-bar">
            <div class="update-bar"></div>
        </div>

        <button slot="ar-button" id="ar-button">
            View in your space
        </button>

        <div id="ar-prompt">
            <img src="https://modelviewer.dev/shared-assets/icons/hand.png">
        </div>

    </model-viewer>

    <div id="error-message">
        <h3>Model Not Found</h3>
        <p>Please ensure 'magnet.glb' is in the 'assets/models/' folder.</p>
    </div>

    <div class="note">
        Point your camera at a flat surface to place the magnet in AR.
    </div>

    <script>
        const modelViewer = document.querySelector('model-viewer');
        const errorMessage = document.getElementById('error-message');
        const arButton = document.getElementById('ar-button');

        // Check if AR is supported on this device/browser
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                if (!modelViewer.canActivateAR) {
                    console.log("AR not supported on this device/browser.");
                    const note = document.querySelector('.note');
                    if (note) {
                        note.innerHTML = "⚠️ AR is not available on this device.<br>Try opening this page on a mobile phone via <strong>HTTPS</strong>.";
                        note.style.color = "#fbbf24";
                    }
                }
            }, 1000); // Give it a moment to initialize
        });

        // Handle loading errors
        modelViewer.addEventListener('error', (e) => {
            console.error('Error loading model:', e);
            errorMessage.innerHTML = `<h3>Error Loading Model</h3><p>${e.detail.type || 'Unknown error'}</p>`;
            errorMessage.style.display = 'block';
            document.querySelector('.progress-bar').style.display = 'none';
        });

        // AR Status Logging
        modelViewer.addEventListener('ar-status', (event) => {
            console.log('AR Status:', event.detail.status);
            if (event.detail.status === 'failed') {
                errorMessage.innerHTML = "<h3>AR Session Failed</h3><p>Camera access denied or device incompatible.</p>";
                errorMessage.style.display = 'block';
                setTimeout(() => { errorMessage.style.display = 'none'; }, 3000);
            }
        });

        // Progress bar logic
        modelViewer.addEventListener('progress', (e) => {
            const progressBar = document.querySelector('.progress-bar');
            const updateBar = document.querySelector('.update-bar');

            if (e.detail.totalProgress === 0) {
                progressBar.classList.remove('hide');
            } else {
                updateBar.style.width = `${e.detail.totalProgress * 100}%`;
                if (e.detail.totalProgress === 1) {
                    progressBar.classList.add('hide');
                }
            }
        });
    </script>
</body>

</html>
